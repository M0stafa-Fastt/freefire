<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART - أسرع شحن ألعاب</title>
    <!-- Elegant Font Weights -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800;900&family=Outfit:wght@800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="البوابة الرقمية الأولى لشحن الألعاب في مصر">
</head>
<body class="gaming-body">

    <!-- Global Deep Background -->
    <div class="cyber-ambient">
        <div class="glow-sphere top-right"></div>
        <div class="glow-sphere bottom-left"></div>
        <!-- Light floating particles -->
        <div class="floating-particles"></div>
    </div>

    <!-- Clean Nav -->
    <nav class="premium-nav">
        <div class="logo">
            SMART<span class="logo-dot"></span>
        </div>
    </nav>

    <!-- Focused Light-3D Hero -->
    <main class="hero-focused">
        <div class="hero-content">
            <h1 class="hero-title">روّق حسابك ⚡</h1>
            <p class="hero-subtitle">الشحن اللّي بيسندك وقت اللعب.<br>أسرع، أأمن، وأوفر.</p>
            
            <a href="recharge.html" class="btn-action-3d">
                <span class="btn-label">اشحن الآن</span>
                <span class="btn-icon">←</span>
            </a>
        </div>
        
        <!-- Light 3D Floating Graphic Elements -->
        <div class="hero-3d-scene">
            <div class="float-card core-card">
                <div class="glare-surface"></div>
                <div class="brand-insignia">S</div>
            </div>
            <div class="float-gem gem-1"></div>
            <div class="float-gem gem-2"></div>
        </div>
    </main>
